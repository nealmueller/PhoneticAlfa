<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phonetic Alfa Privacy Policy</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef3f8;
      --panel: rgba(255, 255, 255, 0.88);
      --text: #172033;
      --muted: #5d6778;
      --border: rgba(23, 32, 51, 0.08);
      --accent: #1f5fbf;
      --shadow: 0 18px 42px rgba(18, 29, 52, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(52, 105, 197, 0.12), transparent 34%),
        linear-gradient(180deg, #f7fafd 0%, var(--bg) 100%);
      color: var(--text);
      line-height: 1.6;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 56px 20px 72px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .eyebrow {
      margin: 0 0 12px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 5vw, 46px);
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    .meta {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .intro {
      margin: 28px 0 0;
      font-size: 20px;
      line-height: 1.5;
      color: var(--text);
      max-width: 36rem;
    }

    .grid {
      display: grid;
      gap: 18px;
      margin-top: 32px;
    }

    .section {
      padding-top: 18px;
      border-top: 1px solid rgba(23, 32, 51, 0.08);
    }

    .section:first-child {
      padding-top: 0;
      border-top: 0;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .contact {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid rgba(23, 32, 51, 0.08);
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .technical {
      margin-top: 26px;
      padding: 16px 18px;
      border-radius: 16px;
      background: rgba(31, 95, 191, 0.05);
      border: 1px solid rgba(31, 95, 191, 0.08);
      font-size: 13px;
      color: var(--muted);
    }

    code {
      font-family: ui-monospace, SFMono-Regular, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      color: var(--text);
      background: rgba(23, 32, 51, 0.06);
      padding: 2px 6px;
      border-radius: 6px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <p class="eyebrow">Phonetic Alfa</p>
      <h1>Privacy Policy</h1>
      <p class="intro">
        Phonetic Alfa is designed to work on your device.
      </p>

      <div class="grid">
        <section class="section">
          <h2>How the app works</h2>
          <p>
            Typed text, flashcard activity, and quiz activity stay on-device.
          </p>
        </section>

        <section class="section">
          <h2>Purchases</h2>
          <p>
            "Remove Ads" is a one-time, non-consumable in-app purchase.
          </p>
        </section>
      </div>

    </section>
  </main>
</body>
</html>
